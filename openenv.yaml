name: "open_supply"
version: "1.0.0"
description: "A logistics optimization environment"
entry_point: "open_supply.env:OpenSupplyEnv"
max_steps: 30
reward_range: [-1.0, 1.0]
observation_model: "open_supply.models:SupplyObservation"
action_model: "open_supply.models:SupplyAction"

tasks:
  - name: "easy_routing"
    description: "Easy"
    grader: true
  - name: "medium_budget"
    description: "Medium"
    grader: true
  - name: "hard_optimization"
    description: "Hard"
    grader: true
