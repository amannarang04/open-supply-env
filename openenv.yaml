name: "open_supply"
version: "1.0.0"
description: "Logistics optimization environment"
entry_point: "open_supply.env:OpenSupplyEnv"

max_steps: 30
reward_range: [-1.0, 1.0]

observation_model: "open_supply.models:SupplyObservation"
action_model: "open_supply.models:SupplyAction"

tasks:
  - id: easy_routing
    name: "Easy Routing"
    difficulty: easy
    grader:
      type: rule
      checks:
        - order_delivered
        - cost_optimized

  - id: medium_budget
    name: "Medium Budget"
    difficulty: medium
    grader:
      type: rule
      checks:
        - order_delivered
        - cost_optimized

  - id: hard_optimization
    name: "Hard Optimization"
    difficulty: hard
    grader:
      type: rule
      checks:
        - order_delivered
        - cost_optimized