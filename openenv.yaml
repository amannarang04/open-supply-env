name: "open_supply"
version: "1.0.0"
description: "AI environment for logistics and supply chain optimization"

# The Python path to your environment class
entry_point: "open_supply.env:OpenSupplyEnv"

# Boundaries
max_steps: 30
reward_range: [-1.0, 1.0]

# Models
observation_model: "open_supply.models:SupplyObservation"
action_model: "open_supply.models:SupplyAction"

# Task definitions with grader enabled
tasks:
  - name: "easy_routing"
    description: "Basic routing task"
    grader: true
  - name: "medium_budget"
    description: "Budget constrained task"
    grader: true
  - name: "hard_optimization"
    description: "Complex inventory and budget task"
    grader: true